# RimeTts 配置文件
# 配置文件必须与 EXE 在同一目录下
FileInteractor:
  # Lua 侧写入内容的 JSON 文件路径
  ContentFile: "D:/Program Files/Rime/User_Data/rimetts_content.json"
  # Lua 侧触发信号的文件路径（C# 监听此文件变化）
  SignalFile: "D:/Program Files/Rime/User_Data/rimetts_signal"
SentenceSeg:
  # 最后一次上屏后多少毫秒认为一个句子结束，默认 5000
  NoCommitGapMs: 5000
Translator:
  # LLM API Key
  ApiKey: "sk-xxxxxxxxxxxxxxxx"
  # API 地址（兼容 OpenAI 协议的接口均可）
  BaseUrl: "https://api.siliconflow.cn/v1/chat/completions"
  # 模型名（推荐使用响应速度快的）
  Model: "Qwen/Qwen2.5-72B-Instruct"
  # 请求超时秒数
  TimeoutSec: 20
  # 默认翻译系统提示词（某语言未配置 SystemPrompt 时使用）
  DefaultSystemPrompt: "You are a fast translator. Translate source text to target language only. Return only translation text."
Tts:
  # 全局默认 TTS 引擎优先级（某语言未配置 TtsEngines 时使用）
  Engines: ["gTTS", "SystemSpeech"]
  # 生成的音频文件输出目录（留空则使用 EXE 目录下 tts-output）
  OutputDir: ""
LanguagePipeline:
  # 语种顺序即翻译和播放顺序
  Languages:
    - Language: "en"
      TtsEngines: ["gTTS", "SystemSpeech"]
      SystemPrompt: |
        You are a fast translator. Translate user's input to English. 
        if you don't recognize user's input, justt keep silent and do not output any text.
        Return only translation text. DO NOT output any other text.
        the folloing is user's input:
      #
    - Language: "ja"
      TtsEngines: ["gTTS", "SystemSpeech"]
      SystemPrompt: |
        You are a fast translator. Translate user's input to Japanese. 
        if you don't recognize user's input, justt keep silent and do not output any text.
        Return only translation text. DO NOT output any other text.
        the folloing is user's input:
      # SystemPrompt: |
      #   あなたは翻訳者です。ユーザーの入力を日本語に翻訳してください。翻訳結果の本文のみを返してください。
      #   以下のユーザーの入力です:
